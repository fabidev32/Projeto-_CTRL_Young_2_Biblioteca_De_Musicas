<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <body>
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link
          rel="stylesheet"
          href="./../css/cadastro.css"
          class="stylesheet"
        />
      </head>

      <body>
        <main>
          <!-- Formulário -->
          <div class="div_formulario">
            <input id="nome" type="text" placeholder="Digite o nome" />
            <input
              type="text"
              id="link"
              placeholder="Digite o link da musica"
            />
            <p>Escolha o estilo musical</p>
            <select class="genero"></select>
            <label for="input_com_imagem">Selecione uma imagem</label>
            <input type="file" id="input_com_imagem" />
            <label for="input_com_imagem">Selecione uma música</label>
            <input type="file" id="input_com_audio" />

            <button id="cadastrar" onclick="CadastrarMusica()">
              Cadastrar
            </button>
          </div>

          <!-- Filtro dos cadastro -->
          <h2>Confira a minha lista de musicas abaixo!</h2>
          <div class="div_filtro">
            <p>Filtre pelos estilos musicais!</p>
            <input type="text" id="texto_pesquisa" />
            <button id="limpar_filtro">Limpar filtro</button>
          </div>

          <!-- Lista de musicas -->
          <div class="lista_de_musicas"></div>
        </main>

        <script src="./../javascript/cadastro.js"></script>
      </body>
    </html>
  </body>
</html>
