<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./../css/cadastro.css" class="stylesheet" />
  </head>
  <body>
    <main>
      <section class="container_cadastro">
        <h3>Cadastre sua música favorita abaixo!</h3>
        <div class="div_formulario">
          <div>
            <input
              type="text"
              id="nome"
              placeholder="Digite o nome da música"
            />
            <input
              type="text"
              id="descricao"
              placeholder="Digite a descrição do jogo"
            />
          </div>
          <div>
            <label for="input_com_audio"> Baixe a sua música! </label>
            <input type="file" id="input_com_audio" />
            <label for="input_com_imagem">Selecione uma imagem </label>
            <input type="file" id="input_com_imagem" />
          </div>
          <button id="botao" onclick="CriarMusica()">Adicionar música</button>
        </div>
      </section>

      <section class = "container_lista">
        <div class="lista_de_musicas"></div>
      </section>

    </main>

    <script src="./../javascript/cadastro.js"></script>
  </body>
</html>
